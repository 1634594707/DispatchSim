spring:
  datasource:
    url: jdbc:h2:mem:dispatchsim;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      repositories:
        enabled: false
  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

dispatch-sim:
  messaging:
    enabled: false
  scheduling:
    simulation-tick-enabled: false
    heartbeat-enabled: false
    statistics-cache-refresh-enabled: false
  statistics:
    cache-enabled: false
    local-cache-enabled: false
