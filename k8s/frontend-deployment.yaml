apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatchsim-frontend
  namespace: dispatchsim
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dispatchsim-frontend
  template:
    metadata:
      labels:
        app: dispatchsim-frontend
    spec:
      containers:
        - name: frontend
          image: your-registry/dispatchsim-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
