apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dispatchsim
  namespace: dispatchsim
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - dispatchsim.example.com
      secretName: dispatchsim-tls
  rules:
    - host: dispatchsim.example.com
