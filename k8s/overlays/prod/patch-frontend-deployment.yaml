apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatchsim-frontend
  namespace: dispatchsim
spec:
  replicas: 2
  template:
    spec:
      containers:
        - name: frontend
          image: your-registry/dispatchsim-frontend:latest
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
