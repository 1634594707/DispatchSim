apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatchsim-backend
  namespace: dispatchsim
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: backend
          image: your-registry/dispatchsim-backend:latest
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
