apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatchsim-frontend
  namespace: dispatchsim
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: frontend
          image: your-registry/dispatchsim-frontend:latest
          resources:
            requests:
              cpu: "50m"
              memory: "96Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
