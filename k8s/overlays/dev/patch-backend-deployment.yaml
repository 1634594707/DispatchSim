apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatchsim-backend
  namespace: dispatchsim
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: backend
          image: your-registry/dispatchsim-backend:latest
          resources:
            requests:
              cpu: "200m"
              memory: "384Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
