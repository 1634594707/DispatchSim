apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dispatchsim
  namespace: dispatchsim
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
spec:
  ingressClassName: nginx
  rules:
    - host: dispatchsim.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: dispatchsim-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: dispatchsim-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dispatchsim-frontend
                port:
                  number: 80
