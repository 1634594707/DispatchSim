name: docker-k8s

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}
  BACKEND_IMAGE_NAME: dispatchsim-backend
  FRONTEND_IMAGE_NAME: dispatchsim-frontend

jobs:
  quality-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: SonarQube Scan
        if: ${{ secrets.SONAR_HOST_URL != '' && secrets.SONAR_TOKEN != '' }}
        working-directory: dispatch-sim-backend
        run: |
          ./mvnw -B test sonar:sonar \
            -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Skip SonarQube Scan
        if: ${{ secrets.SONAR_HOST_URL == '' || secrets.SONAR_TOKEN == '' }}
        run: echo "SONAR_HOST_URL / SONAR_TOKEN not configured, skipping SonarQube scan."

  build-and-push:
    needs: quality-backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "image_tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./dispatch-sim-backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

  deploy-dev:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DEV }}" | base64 --decode > "$HOME/.kube/config"

      - name: Apply dev overlay
        shell: bash
        run: |
          kubectl apply -k k8s/overlays/dev
          kubectl set image deployment/dispatchsim-backend backend=ghcr.io/${{ github.repository_owner }}/dispatchsim-backend:${IMAGE_TAG} -n dispatchsim-dev
          kubectl set image deployment/dispatchsim-frontend frontend=ghcr.io/${{ github.repository_owner }}/dispatchsim-frontend:${IMAGE_TAG} -n dispatchsim-dev

  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_PROD }}" | base64 --decode > "$HOME/.kube/config"

      - name: Apply prod overlay
        shell: bash
        run: |
          kubectl apply -k k8s/overlays/prod
          kubectl set image deployment/dispatchsim-backend backend=ghcr.io/${{ github.repository_owner }}/dispatchsim-backend:${IMAGE_TAG} -n dispatchsim-prod
          kubectl set image deployment/dispatchsim-frontend frontend=ghcr.io/${{ github.repository_owner }}/dispatchsim-frontend:${IMAGE_TAG} -n dispatchsim-prod
