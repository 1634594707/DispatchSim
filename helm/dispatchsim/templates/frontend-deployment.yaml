apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dispatchsim.fullname" . }}-frontend
  namespace: {{ include "dispatchsim.namespace" . }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dispatchsim.fullname" . }}-frontend
  template:
    metadata:
      labels:
        app: {{ include "dispatchsim.fullname" . }}-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.service.targetPort }}
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.frontend.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
