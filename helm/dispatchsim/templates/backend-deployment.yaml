apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dispatchsim.fullname" . }}-backend
  namespace: {{ include "dispatchsim.namespace" . }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "dispatchsim.fullname" . }}-backend
  template:
    metadata:
      labels:
        app: {{ include "dispatchsim.fullname" . }}-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.service.targetPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "dispatchsim.fullname" . }}-backend-config
            - secretRef:
                name: {{ include "dispatchsim.fullname" . }}-backend-secret
          readinessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.targetPort }}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.backend.service.targetPort }}
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
