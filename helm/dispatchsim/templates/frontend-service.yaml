apiVersion: v1
kind: Service
metadata:
  name: {{ include "dispatchsim.fullname" . }}-frontend
  namespace: {{ include "dispatchsim.namespace" . }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: {{ include "dispatchsim.fullname" . }}-frontend
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.targetPort }}
